<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>
        Print Numbers 1 to 50
        <p class="result"></p>
    </h1>
    <script>
        for(i=0; i<=50; i++){
            document.getElementsByClassName("result").innerHTML = i
            console.log(i)
        }
    </script>
</body>
</html>
