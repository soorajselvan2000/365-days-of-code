<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Palindrome</title>
</head>
<body>
    <h1>Palindrome checking</h1>
    <form action="" onsubmit="palindrome()">
        <label for="inputString">Enter the word: </label><br>
        <input type="text" id="inputString" oninput="clearInput()">
        <input type="Submit" value="Check">
    </form><br>
    
    <b>Result: </b><span id="result"></span>
    <script>

        //     event.preventDefault()
        //     userInput = document.getElementById("inputString").value;
        //     for(i = 0; i <= userInput.length/2; i++){

        //             document.getElementById('result').innerHTML = "It is not a Palindrome";
        //         }
        //         else{
        //             document.getElementById('result').innerHTML = "It is a Palindrome";
        //         }
        //     }
        // }

         function palindrome(){
            event.preventDefault()
            userInput = document.getElementById("inputString").value;
            isPalindrome = true;
            for(i = 0; i <= userInput.length/2; i++){
                if(userInput[i] != userInput[userInput.length-1-i]){
                    isPalindrome = false;
                    break
                }
            }
            document.getElementById('result').innerHTML =
            isPalindrome ? `The word '${userInput}' is <b>Palindrome<b>` : `The word '${userInput}' is not a <b>Palindrome</b>`
        }
        function clearInput(){
            document.getElementById('result').innerHTML = ''
        }
        
    </script>
    
</body>
</html>
